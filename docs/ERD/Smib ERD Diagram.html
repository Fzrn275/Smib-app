
<style>
#erd { padding: 1rem 0; }
#erd svg { width: 100%; }
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#1e3a5f' : '#e6f1fb',
    primaryBorderColor: dark ? '#378add' : '#185fa5',
    primaryTextColor: dark ? '#c2c0b6' : '#1e293b',
    secondaryColor: dark ? '#1a3a2a' : '#eaf3de',
    tertiaryColor: dark ? '#2d1f4e' : '#eeedfe',
  },
});

const diagram = `erDiagram
  users {
    uuid id PK
    varchar name
    varchar email
    varchar role
    varchar grade_level
    varchar school_name
    varchar district
    varchar avatar_url
    int4 xp
    int4 level
    timestamp created_at
  }

  creators {
    uuid id PK
    uuid user_id FK
    varchar creator_type
    varchar organisation
    varchar focus_area
    boolean is_verified
    uuid verified_by FK
    timestamp created_at
  }

  projects {
    uuid id PK
    uuid creator_id FK
    varchar title
    varchar difficulty
    varchar category
    varchar type
    varchar instruction_level
    int4 estimated_duration
    int4 creativity_score
    varchar status
    varchar[] tags
    varchar cover_image_url
    timestamp created_at
  }

  steps {
    uuid id PK
    uuid project_id FK
    int4 step_number
    varchar title
    text instructions
    varchar image_ref
    timestamp created_at
  }

  materials {
    uuid id PK
    uuid project_id FK
    varchar name
    boolean is_recyclable
    timestamp created_at
  }

  progress {
    uuid id PK
    uuid student_id FK
    uuid project_id FK
    int4[] completed_steps
    int4 current_step
    numeric progress_pct
    boolean is_completed
    timestamp enrolled_at
  }

  step_submissions {
    uuid id PK
    uuid student_id FK
    uuid step_id FK
    uuid project_id FK
    varchar photo_url
    int4 xp_awarded
    timestamp completed_at
  }

  achievements {
    uuid id PK
    uuid student_id FK
    varchar title
    varchar type
    varchar trigger_type
    timestamp date_awarded
  }

  certificates {
    uuid id PK
    uuid achievement_id FK
    uuid student_id FK
    uuid project_id FK
    varchar cert_type
    varchar verification_code
    varchar issued_by
    timestamp issued_at
  }

  streaks {
    uuid id PK
    uuid student_id FK
    int4 current_streak
    int4 longest_streak
    date last_active_date
    timestamp updated_at
  }

  notifications {
    uuid id PK
    uuid user_id FK
    varchar type
    varchar title
    boolean is_read
    timestamp created_at
  }

  parent_student_links {
    uuid id PK
    uuid parent_id FK
    uuid student_id FK
    timestamp created_at
  }

  users ||--o{ creators : "extends"
  users ||--o{ progress : "tracks"
  users ||--o{ achievements : "earns"
  users ||--o{ certificates : "receives"
  users ||--o{ step_submissions : "submits"
  users ||--|| streaks : "has"
  users ||--o{ notifications : "receives"
  users ||--o{ parent_student_links : "linked as parent"
  users ||--o{ parent_student_links : "linked as student"
  creators ||--o{ projects : "creates"
  projects ||--o{ steps : "contains"
  projects ||--o{ materials : "requires"
  projects ||--o{ progress : "tracked by"
  projects ||--o{ step_submissions : "documented by"
  projects ||--o{ certificates : "generates"
  steps ||--o{ step_submissions : "completed via"
  achievements ||--o{ certificates : "generates"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
